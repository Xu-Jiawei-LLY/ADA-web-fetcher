name: Copilot Copilot Setup Steps                                                                                                                                   
                                                                                                                                                                       
on: work: workflow_dispatch: push:                                                                                                                                  
       paths:                                                                                                                                                          
          paths:                                                                                                                                                       
         - .github/workflows/copilot-setupt-setup-steps.yml                                                                                                            
     pull_request:                                                                                                                                                     
       paths:                                                                                                                                                          
         - .github/ithub/workflows/copilot-setu-setup-steps.yml                                                                                                        
                                                                                                                                                                       
jobs: copilot-setup-steot-setup-steps:                                                                                                                              
       runs-on: ubuntu-launtu-latest                                                                                                                                   
       permissions:                                                                                                                                                    
         contents: read ad                                                                                                                                             
       timeout-minutesnutes: 59                                                                                                                                        
       env:                                                                                                                                                            
         FO   FORCE_JAVASCRIPT_ACTIONS_TO_NODO_NODE24: true                                                                                                            
       step  steps:                                                                                                                                                    
       permissions:                                                                                                                                                    
         contents: read                                                                                                                                                
       timeout-minutes: 59                                                                                                                                             
       env:                                                                                                                                                            
         FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true                                                                                                                      
       steps:                                                                                                                                                          
         - name: Checkout code                                                                                                                                         
           uses: actions/checkout@v5                                                                                                                                   
                                                                                                                                                                       
         - name: Set up Node.js                                                                                                                                        
           uses: actions/setup-node@v5                                                                                                                                 
           with:                                                                                                                                                       
             node-version: "20"                                                                                                                                        
                                                                                                                                                                       
         - name: Install app dependencies                                                                                                                              
           working-directory: ada-web-fetcher/app                                                                                                                      
           run: |                                                                                                                                                      
             if [ -f package-lock.json ]; then npm ci; else npm install; fi                                                                                            
                                                                                                                                                                       
         - name: Install Playwright Chromium                                                                                                                           
           working-directory: ada-web-fetcher/app                                                                                                                      
           run: npx playwright install --with-deps chromium || true  
